name: Build and Deploy to Azure

on:
  push:
    paths:
      - "backend/**"
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  id-token: write
  contents: read

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cicd
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Grant execute permissions to Maven Wrapper
        run: chmod +x mvnw

      - name: Build JAR file
        run: |
          ./mvnw clean package -DskipTests

      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Log in to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{secrets.ACR_LOGIN_SERVER }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build Docker Image
        run: |
          IMAGE_TAG=v1
          docker build -t ${{ secrets.ACR_LOGIN_SERVER }}/demo-api:$IMAGE_TAG .
      # ✅ Step 5: Push the Docker Image to ACR (Use v1 instead of latest)
      - name: Push Docker Image
        run: |
          IMAGE_TAG=v1
          docker push ${{ secrets.ACR_LOGIN_SERVER }}/demo-api:$IMAGE_TAG
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest

    steps:
      - name: Log in to Azure
        uses: azure/login@v1
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
        # ✅ Step 7: Deploy to Azure App Service (Use v1 instead of latest)

      - name: Deploy to Azure App Service
        run: |
          az webapp config container set --name ${{ secrets.WEBAPP_NAME }} --resource-group ${{ secrets.RESOURCE_GROUP }} --docker-custom-image-name ${{ secrets.ACR_LOGIN_SERVER }}/demo-api:v1
          az webapp restart --name ${{ secrets.WEBAPP_NAME }} --resource-group ${{ secrets.RESOURCE_GROUP }}
