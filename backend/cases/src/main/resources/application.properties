spring.application.name=cases
server.port=8081

eureka.instance.prefer-ip-address=true
eureka.client.fetch-registry=true
eureka.client.register-with-eureka=true

# Redundant
# spring.datasource.driver-class-name=org.postgresql.Driver

spring.security.oauth2.resourceserver.jwt.issuer-uri=https://lemur-9.cloud-iam.com/auth/realms/lifestage

# Makes hibernate create tables before seeding
spring.jpa.defer-datasource-initialization=true

# Makes hibernate create tables
spring.jpa.hibernate.ddl-auto=${SPRING_JPA_HIBERNATE_DDL_AUTO:update}

# Seeding
spring.sql.init.mode=never