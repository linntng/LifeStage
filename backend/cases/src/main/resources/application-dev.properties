eureka.client.service-url.defaultZone=http://localhost:9099/eureka

spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/lifestage}
spring.datasource.username=lifestage
spring.datasource.password=lifestage_pw

spring.jpa.show-sql=true

spring.jpa.properties.hibernate.format_sql=true

logging.level.org.springframework.security=DEBUG

external.user.api.url=http://localhost:8080/api/v1/users

# Needs this for some reason...
spring.datasource.driver-class-name=org.postgresql.Driver
