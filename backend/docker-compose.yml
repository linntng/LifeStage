services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: lifestage
      POSTGRES_USER: lifestage
      POSTGRES_PASSWORD: lifestage_pw
    ports:
      - "5432:5432"
  lifestage_backend:
    build: ./lifestage
    container_name: lifestage-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lifestage
      SPRING_DATASOURCE_USERNAME: lifestage
      SPRING_DATASOURCE_PASSWORD: lifestage_pw
    depends_on:
      - db
      - eureka_backend
  cases_backend:
    build: ./cases
    container_name: cases-backend
    ports:
      - "8081:8081"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/lifestage
      SPRING_DATASOURCE_USERNAME: lifestage
      SPRING_DATASOURCE_PASSWORD: lifestage_pw
    depends_on:
      - db
      - eureka_backend
      - lifestage_backend
  eureka_backend:
    build: ./eureka
    container_name: eureka-backend
    ports:
      - "9099:9099"