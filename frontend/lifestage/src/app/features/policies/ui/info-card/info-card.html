<article class="bg-primary-active p-4 rounded-lg w-full hover:bg-primary-hover">
	<mat-card class="rounded-lg shadow-lg mb-4 w-full" (click)="openDialog()">
		<mat-card-header class="flex flex-col items-start">
			<h3>{{ policy.name ? policy.name : 'Untitled' }}</h3>
			<p>{{ 'Premium: ' + (policy.premium ? policy.premium : 'No premium') }}</p>
			<p>Coverage includes:</p>
			@for (lifeeventIds of policy.coveredLifeEvents; track lifeeventIds) {
				<li class="ml-7">{{ getLifeeventName(lifeeventIds)?.name | capitalize }}</li>
			}
		</mat-card-header>
	</mat-card>
</article>
