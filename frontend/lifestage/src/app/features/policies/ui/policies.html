<div>
	<section>
		<h2>Your policies</h2>
		@if (userPolicies()?.length === 0) {
			<p class="p-5">You have no policies.</p>
		}
		@for (policy of userPolicies(); track policy) {
			{{ policy.name }}
		}
	</section>
	<section>
		<h2>Policies</h2>
		<div class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 gap-4">
			@for (policy of policies(); track policy.id) {
				<app-info-card [policy]="policy"> </app-info-card>
			}
		</div>
	</section>
</div>
