<div>
	<h2>Life Events</h2>
	<section>
		@for (event of lifeevents(); track event) {
			<button 
			(click)="toggleEvent(event)"
			class="w-full"
			[class]="userLifeevents()?.some(e => e?.id === event.id) ? 'bg-primary': ''"
			>{{ event?.name }}</button>
			
		}
	</section>

	<h2>User life Events</h2>
	<ul>
		@for (event of userLifeevents(); track event) {
			<button>{{ event?.name }}</button>
		}
	</ul>
</div>

<div
	[class]="true ? 'block' : 'hidden'"
>

</div>
