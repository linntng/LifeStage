<button
	(click)="toggleAuth()"
	(keydown.enter)="toggleAuth()"
	(keydown.space)="toggleAuth()"
	class="text-2xl p-2 cursor-pointer"
>
	{{ this.authenticated() ? 'Logout' : 'Login' }}
</button>

<p>{{ userStore.currentUser() ? userStore.currentUser()!.username + " is logged in" : 'No user logged in' }}</p>
